<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>願望実現許可証</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="certificate-image" id="certificate">

<h1>願望実現許可証</h1>

<p class="certificate-text">
あなたに
</p>

<h2 id="wishText"></h2>

<p class="certificate-text">
の実現を許可します。
</p>

<p class="issue-date">
令和八年六月六日
</p>

<p class="issuer">
願望実現許可証発行局
</p>

</div>

  <br>

<button onclick="saveCertificate()">
画像として保存する
</button>
  
<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("wishText").textContent =
params.get("wish");

  <script>

function saveCertificate() {

html2canvas(
document.getElementById("certificate")
).then(canvas => {

const link =
document.createElement("a");

link.download =
"ganbou-kyokasho.png";

link.href =
canvas.toDataURL();

link.click();

});

}

</script>

  
</script>
  
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  
</body>
</html>
