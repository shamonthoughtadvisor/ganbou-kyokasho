<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>願望実現許可証</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="certificate-image" id="certificate">

<div class="certificate-main">

<p class="certificate-text">
の実現を許可します。
</p>

<h2 id="wishText"></h2>

<h3 id="nameText"></h3>

<p id="certificateNo"></p>

<h1>願望実現許可証</h1>

</div>

<p class="certificate-text">
の実現を許可します。
</p>

<p class="issue-date" id="issueDate">
</p>

</div>

<p class="issuer">
願望実現許可証発行局
</p>

<p class="site-url">
shamonthoughtadvisor.github.io/ganbou-kyokasho
</p>
  
</div>

<br>

<button onclick="saveCertificate()">
画像として保存する
</button>

<button onclick="shareX()">
Xで共有する
</button>
  
<script>
const params = new URLSearchParams(window.location.search);
const number =
Math.floor(Math.random() * 900000) + 100000;

document.getElementById("certificateNo").textContent =
"第" + number + "号";

const today = new Date();

document.getElementById("issueDate").textContent =
today.getFullYear() + "年"
+ (today.getMonth() + 1) + "月"
+ today.getDate() + "日";
  
const wish =
params.get("wish");

const name =
params.get("name");

document.getElementById("wishText").textContent =
wish;

if(name && name.trim() !== "") {

document.getElementById("nameText").textContent =
name + " 殿";

} else {

document.getElementById("nameText").textContent =
"あなたに";

}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
function saveCertificate() {

html2canvas(
document.getElementById("certificate")
).then(canvas => {

const link =
document.createElement("a");

link.download =
"ganbou-kyokasho.png";

link.href =
canvas.toDataURL();

link.click();

});

}

function shareX() {

const text =
"『" + wish + "』の実現許可証を発行しました。";

const url =
"https://shamonthoughtadvisor.github.io/ganbou-kyokasho/";

window.open(
"https://twitter.com/intent/tweet?text="
+ encodeURIComponent(text)
+ "&url="
+ encodeURIComponent(url)
);

}
  
</script>

</body>
</html>
