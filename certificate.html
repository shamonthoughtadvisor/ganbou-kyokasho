<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>願望実現許可証</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="certificate-image" id="certificate">

<div class="certificate-main">

<h1>許  可  証</h1>

<p id="certificateNo"></p>

<h3 id="nameText"></h3>

<h2 id="wishText"></h2>

<p class="certificate-text">
の実現を許可します。
</p>

</div>

<div class="certificate-footer">

<p class="issue-date" id="issueDate"></p>

<p class="issuer">
全知全能の神
</p>

</div>

<p class="site-url">
shamonthoughtadvisor.github.io/ganbou-kyokasho
</p>

</div>

<p class="message">

この許可証があなた自身に許可を与える
きっかけになれば幸いです。

</p>

<hr>

<p class="support-text">

運営継続への応援や願掛けのお賽銭、
願望実現後のお礼をご希望の方はこちらからどうぞ。

</p>

<div class="support-links">

<a href="PayPayのURL" target="_blank">

<img
src="paypay-qr.png"
alt="PayPay"
class="support-icon">

</a>

<a href="BOOTHのURL" target="_blank">

<img
src="booth-icon.png"
alt="BOOTH"
class="support-icon">

</a>

</div>

<br>
  
<br>

<button onclick="saveCertificate()">
画像として保存する
</button>

<button onclick="shareX()">
Xで共有する
</button>

<script>
const params = new URLSearchParams(window.location.search);

const number =
Math.floor(Math.random() * 900000) + 100000;

document.getElementById("certificateNo").textContent =
"第" + number + "号";

const today = new Date();

document.getElementById("issueDate").textContent =
today.getFullYear() + "年"
+ (today.getMonth() + 1) + "月"
+ today.getDate() + "日";

const wish =
params.get("wish");

const name =
params.get("name");

const limitedWish =
wish ? wish.slice(0, 40) : "";

const limitedName =
name ? name.slice(0, 10) : "";
  
document.getElementById("wishText").textContent =
limitedWish;

if(name && name.trim() !== "") {

document.getElementById("nameText").textContent =
limitedName + " 殿";

} else {

document.getElementById("nameText").textContent =
"あなたに";

}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

function saveCertificate() {

html2canvas(
document.getElementById("certificate")
).then(canvas => {

const link =
document.createElement("a");

link.download =
"ganbou-kyokasho.png";

link.href =
canvas.toDataURL();

link.click();

});

}

function shareX() {

const text =
"『" + wish + "』の実現許可証を発行しました。";

const url =
"https://shamonthoughtadvisor.github.io/ganbou-kyokasho/";

window.open(
"https://twitter.com/intent/tweet?text="
+ encodeURIComponent(text)
+ "&url="
+ encodeURIComponent(url)
);

}

</script>

</body>
</html>
