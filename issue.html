<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>願望入力</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>願望入力</h1>

<p>
それでは許可証を発行いたします。
</p>

<p>
実現したい願望を入力してください。
</p>

<p>
願望
</p>

<input type="text" id="wish" style="width:100%;">

<p>
お名前（任意）
</p>

<input type="text" id="name" style="width:100%;">

<br><br>

<button onclick="issueCertificate()">
許可証を発行する
</button>

<script>
function issueCertificate() {

const wish =
document.getElementById("wish").value;

window.location.href =
"certificate.html?wish=" +
encodeURIComponent(wish);

}
</script>

</body>
</html>
