<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>願望入力</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>願望入力</h1>

<p>
それでは許可証を発行いたします。
</p>

<p>
実現したい願望を入力してください。
</p>

<p>
例：
</p>

<ul>
<li>小説家になる</li>
<li>理想のパートナーと出会う</li>
<li>年収1000万円を達成する</li>
<li>世界一周旅行をする</li>
</ul>

<hr>

<p>
〇願望（40文字以内）
</p>

<input
type="text"
id="wish"
maxlength="40"
style="width:100%;">

<p>
の実現を許可します。
</p>
  
<p>
〇お名前（任意・10文字以内）
</p>

<input
type="text"
id="name"
maxlength="10"
style="width:100%;">

<p>
〇許可者（任意・10文字以内）
</p>

<input
type="text"
id="issuer"
maxlength="10"
style="width:100%;">
  
<br>

<br>

<button onclick="issueCertificate()">
許可証を発行する
</button>

<script>

function issueCertificate() {

const wish =
document.getElementById("wish").value.trim();

const name =
document.getElementById("name").value.trim();

const issuer =
document.getElementById("issuer").value.trim();
  
if(wish === ""){

alert(
"願望を入力してください。"
);

return;

}

window.location.href =
"certificate.html?wish=" +
encodeURIComponent(wish) +
"&name=" +
encodeURIComponent(name) +
"&issuer=" +
encodeURIComponent(issuer);

}

</script>

</body>
</html>
